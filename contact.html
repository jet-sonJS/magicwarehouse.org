   <img src="https://img.freepik.com/free-vector/bright-colored-neon-frame_52683-73043.jpg" alt="MAGICWAREHOUSE.org Logo" id="logo">

    <header id="header">
        <h1>Contact Us</h1>
        <p>Want a quote? Get in touch with us!</p>
    </header>
  </div>

    <section class="contact-form">
        <form action="contact_submit.js" id="contactForm">
            <input type="hidden" name="access_key" value="a2b1611e-7229-4b6c-b165-8659083a94c7">
            <label for="name">Name:</label><br>
            <input type="text" id="name" name="name" placeholder="e.g. Kiera Johnson" autocomplete="off" required><br><br>

            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email" placeholder="e.g. kiera123@example.com" autocomplete="off" required><br><br>

            <label for="message">Message:</label><br>
            <textarea id="message" name="message" rows="5" placeholder="Your message here..." required></textarea><br><br>

            <button type="submit">Submit</button>
        </form>
        <div id="result"></div>
        <script src="contact_submit.js"></script>
    </section>
</body>
</html>
